name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed file types
    runs-on: ubuntu-latest
    outputs:
      css_or_scss_changed: ${{ steps.filter.outputs.css_or_scss_changed }}
      eslint_target_changed: ${{ steps.filter.outputs.eslint_target_changed }}
      typecheck_target_changed: ${{ steps.filter.outputs.typecheck_target_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect CI-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            css_or_scss_changed:
              - '**/*.css'
              - '**/*.scss'
              - stylelint.config.js
              - package.json
              - pnpm-lock.yaml
              - .nvmrc
              - .github/workflows/ci.yml
            eslint_target_changed:
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.mjs'
              - '**/*.cjs'
              - eslint.config.js
              - package.json
              - pnpm-lock.yaml
              - .nvmrc
              - .github/workflows/ci.yml
            typecheck_target_changed:
              - '**/*.ts'
              - '**/*.tsx'
              - tsconfig.json
              - tsconfig.*.json
              - package.json
              - pnpm-lock.yaml
              - .nvmrc
              - .github/workflows/ci.yml

  typecheck:
    name: Typecheck
    needs: changes
    if: needs.changes.outputs.typecheck_target_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  eslint:
    name: ESLint
    needs: changes
    if: needs.changes.outputs.eslint_target_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

  stylelint:
    name: Stylelint
    needs: changes
    if: needs.changes.outputs.css_or_scss_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stylelint
        run: pnpm run lint:style
